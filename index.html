<!DOCTYPE html>
<html>
<head>
    <title>Muskan's Earring Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✨ Muskan's Earring Shop ✨</h1>

<input type="text" id="search" placeholder="Search earrings...">

<p>🛒 Cart Items: <span id="cartCount">0</span></p>
    <h3>Cart</h3>
<ul id="cartList"></ul>

<h2>Total: ₹<span id="total">0</span></h2>

<button onclick="buyNow()">Buy Now</button>

<div class="products">

<div class="product" data-name="Stud">
    <img src="stud.png" width="150">
    <h2>Stud</h2>
    <p>₹99</p>
    <button onclick="addToCart('Stud',99)">Add to Cart</button>
</div>

<div class="product" data-name="Leverback">
    <img src="leverback.png" width="150">
    <h2>Leverback</h2>
    <p>₹150</p>
    <button onclick="addToCart('Leverback',150)">Add to Cart</button>
</div>

<div class="product" data-name="English Lock">
    <img src="englishhook.png" width="150">
    <h2>English Lock</h2>
    <p>₹200</p>
    <button onclick="addToCart('English Lock',200)">Add to Cart</button>
</div>

<div class="product" data-name="Wire Hook">
    <img src="wirehook.png" width="150">
    <h2>Wire Hook</h2>
    <p>₹170</p>
    <button onclick="addToCart('Wire Hook',170)">Add to Cart</button>
</div>

<div class="product" data-name="Huggie">
    <img src="huggies.png" width="150">
    <h2>Huggie</h2>
    <p>₹250</p>
    <button onclick="addToCart('Huggie',250)">Add to Cart</button>
</div>

<div class="product" data-name="Dangle">
    <img src="dangle.png" width="150">
    <h2>Dangle</h2>
    <p>₹300</p>
    <button onclick="addToCart('Dangle',300)">Add to Cart</button>
</div>

<div class="product" data-name="Hoop">
    <img src="hoop.png" width="150">
    <h2>Hoop</h2>
    <p>₹280</p>
    <button onclick="addToCart('Hoop',280)">Add to Cart</button>
</div>

</div>

<h2>Total: ₹<span id="total">0</span></h2>
<button onclick="buyNow()">Buy Now</button>

<script src="script.js"></script>

</body>
</html>
